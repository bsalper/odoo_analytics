name: Sync Odoo Invoices RAW

on:
  schedule:
    - cron: "0 12 * * *" # 09:00 AM Chile (ajusta según necesites)
  workflow_dispatch: # Esto permite que lo pruebes haciendo clic en un botón

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create GCP credentials file
        run: |
          # Usamos comillas simples para proteger el contenido del JSON
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > gcp-key.json

      - name: Run pipeline RAW
        env:
          # Inyectamos los secrets para que get_odoo_client() los lea
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }} 
          # Nota: Si usas API Key cámbialo a ODOO_API_KEY
          
          # Configuración de Google para BigQuery
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
          
          PYTHONPATH: .
        run: |
          # Según tu imagen, el archivo está en pipelines/sync_invoices_raw.py
          python pipelines/sync_invoices_raw.py