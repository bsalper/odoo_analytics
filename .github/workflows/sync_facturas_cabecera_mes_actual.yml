name: Sync Odoo Invoices RAW

on:
  schedule:
    - cron: "0 12 * * *" # 09:00 AM Chile
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create GCP credentials file
        run: |
          # Usamos printf para evitar problemas con caracteres especiales y saltos de línea
          printf "%s" "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 --decode > gcp-key.json
          
          # Paso de verificación: Si el archivo mide 0 bytes, el pipeline fallará aquí con un mensaje claro
          if [ ! -s gcp-key.json ]; then
            echo "ERROR: El archivo gcp-key.json está vacío. Revisa el Secret en GitHub."
            exit 1
          fi

      - name: Run pipeline RAW
        env:
          # --- Credenciales de Odoo ---
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          # IMPORTANTE: El nombre aquí debe ser ODOO_API_KEY para que odoo.py lo encuentre
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          
          # --- Credenciales de Google ---
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          
          PYTHONPATH: .
        run: |
          # Ruta verificada según tu comentario anterior
          python pipelines/odoo_raw/sync_invoices_raw.py