name: Sync Odoo Analytics (Cabecera y Detalle)

on:
  # Se ejecuta automáticamente todos los días a las 05:00 AM Chile
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  run-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Asegúrate de que requirements.txt incluya: pandas, google-cloud-bigquery, python-dateutil
          pip install -r requirements.txt

      - name: Create GCP credentials file
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > gcp-key.json

      - name: Run Analytics Pipeline - CABECERA
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
          PYTHONPATH: .
        run: |
          python pipelines/odoo_analytics/sync_invoices.py

      - name: Run Analytics Pipeline - DETALLE
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
          PYTHONPATH: .
        run: |
          python pipelines/odoo_analytics/sync_invoice_lines.py